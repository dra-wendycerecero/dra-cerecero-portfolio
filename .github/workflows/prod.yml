name: CI/CD Pipeline

on:
  push:
    branches: [prod]
  pull_request:
    branches: [prod]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-prod
  cancel-in-progress: false

jobs:
  validate:
    name: Validate site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check HTML structure
        run: |
          set -e
          echo "Checking required files..."
          test -f index.html || (echo "index.html missing" && exit 1)
          test -f favicon.svg || (echo "favicon.svg missing" && exit 1)
          echo "Files present."

      - name: Lint HTML (basic)
        run: |
          set -e
          SIZE=$(wc -c < index.html)
          echo "index.html size: ${SIZE} bytes"
          if [ "$SIZE" -gt 524288 ]; then
            echo "ERROR: index.html exceeds 512KB"
            exit 1
          fi

      - name: Verify meta tags
        run: |
          set -e
          grep -q '<title>' index.html || (echo "Missing <title>" && exit 1)
          grep -q 'meta name="viewport"' index.html || (echo "Missing viewport" && exit 1)
          grep -q 'meta name="description"' index.html || (echo "Missing description" && exit 1)
          echo "Meta tags OK."

      - name: Check no absolute URLs leak credentials
        run: |
          echo "Checking for accidentally committed tokens..."
          if grep -E 'ghp_[a-zA-Z0-9]{36}' index.html 2>/dev/null; then
            echo "ERROR: GitHub token found in index.html"; exit 1
          fi
          echo "No leaked tokens."

  deploy:
    name: Deploy to GitHub Pages
    needs: validate
    if: github.event_name == "push" && github.ref == "refs/heads/prod"
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Summary
        run: |
          echo "### Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Live URL: ${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
